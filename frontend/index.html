<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Todo App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="env-config.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My Todo App</h1>
            <p class="subtitle">Simple task management on Kubernetes</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="What needs to be done?" 
                autocomplete="off"
            >
            <button id="addBtn" onclick="addTodo()">Add</button>
        </div>

        <div class="stats">
            <span id="totalCount">0 tasks</span>
            <span id="completedCount">0 completed</span>
        </div>

        <ul id="todoList" class="todo-list">
            <!-- Todos will be injected here -->
        </ul>

        <div class="empty-state" id="emptyState">
            <p>🎉 No tasks yet. Add one above!</p>
        </div>

        <footer>
            <p>Running on Kubernetes | API Status: <span id="apiStatus">Checking...</span></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
